    <script>
        function gerarPDF() {
            const ficha = document.getElementById("ficha");

            html2pdf()
                .set({
                    margin: 10,
                    filename: 'ficha-rpg.pdf',
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2 },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                })
                .from(ficha)
                .save();
        }
    </script>

    const total = Number(base) + Number(dados.total);

    return `
        <div class="linha">
            <span class="nome-atributo">${nomeAtributo}</span>

            <span class="valor">
                (NORMAL ${base})
            </span>

            <span class="bonus">

            </span>

            <span class="bonus">
                (FRAQUEZA <span style="color:#ff5555">-${dados.fraqueza}</span>)
            </span>

            <span class="bonus">
                = TOTAL <span style="color:#ffffff">${total}</span>
            </span>
        </div>
    `;
}


        function randomValue(level) {
            const max = parseInt(level);
            return Math.floor(Math.random() * (max + 1));
        }

        function getBonusText(atributo) {
            const racaKey = document.getElementById("raca").value;
            const classeKey = document.getElementById("classe").value;
            const subclasseKey = document.getElementById("subclasse").value;

            const raca = racas[racaKey];
            const classe = classes[classeKey];

            let total = 0;

            function parseBonus(value) {
                if (!value) return 0;
                return parseInt(value);
            }

            if (raca?.bonus?.[atributo]) {
                total += parseBonus(raca.bonus[atributo]);
            }

            if (classe?.statusInicial?.bonus?.[atributo]) {
                total += parseBonus(classe.statusInicial.bonus[atributo]);
            }

            if (classe?.variacoes?.[subclasseKey]?.bonus?.[atributo]) {
                total += parseBonus(classe.variacoes[subclasseKey].bonus[atributo]);
            }

            return total >= 0 ? `+${total}` : `${total}`;
        }
