<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Arcano</title>

<style>
body{
    margin:0;
    height:100vh;
    font-family: 'Georgia', serif;
    background: radial-gradient(circle at top, #1a1a2e, #0a0a0f);
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
}

/* CONTAINER */
.login-box{
    background: rgba(20,20,35,0.95);
    border: 2px solid #c9a44c;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 25px rgba(201,164,76,0.5);
    width:320px;
    text-align:center;
    position:relative;
}

/* EFEITO MAGICO */
.login-box::before{
    content:"";
    position:absolute;
    top:-2px;
    left:-2px;
    right:-2px;
    bottom:-2px;
    border-radius:15px;
    background: linear-gradient(45deg, #c9a44c, transparent, #c9a44c);
    z-index:-1;
    animation: brilho 4s linear infinite;
}

@keyframes brilho{
    0%{filter: blur(5px) hue-rotate(0deg);}
    100%{filter: blur(5px) hue-rotate(360deg);}
}

/* TITULO */
h1{
    margin-bottom:25px;
    color:#c9a44c;
    text-shadow:0 0 10px #c9a44c;
}

/* INPUTS */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background:#0f0f1a;
    color:#fff;
    outline:none;
    border:1px solid #333;
}

input:focus{
    border-color:#c9a44c;
    box-shadow:0 0 10px #c9a44c;
}

/* BOTÃO PADRÃO */
button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#c9a44c;
    color:#000;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ffd369;
    box-shadow:0 0 15px #ffd369;
}

/* BOTÃO CADASTRO */
.btn-cadastro{
    background:#444;
    color:#fff;
}

.btn-cadastro:hover{
    background:#666;
    box-shadow:0 0 10px #999;
}

/* TEXTO */
.small{
    margin-top:15px;
    font-size:12px;
    color:#aaa;
}

</style>
</head>

<body>

<div class="login-box">
    <h1>🜂 Portal Arcano</h1>

    <form onsubmit="login(event)">
        <input type="text" id="usuario" placeholder="Nome do aventureiro" required>
        <input type="password" id="senha" placeholder="Senha secreta" required>

        <button type="submit">Entrar no Reino</button>
    </form>

    <!-- BOTÃO DE CADASTRO -->
    <button type="button" onclick="irCadastro()" class="btn-cadastro">
        Registrar na Guilda
    </button>

    <div class="small">Apenas membros da guilda podem entrar</div>
</div>

<script>
function login(e){
    e.preventDefault();

    const user = document.getElementById("usuario").value;
    const pass = document.getElementById("senha").value;

    if(user === "mago" && pass === "123"){
        alert("✨ Bem-vindo ao reino, " + user + "!");
    }else{
        alert("❌ Credenciais inválidas!");
    }
}

function irCadastro(){
    window.location.href = "cadastro.html";
}
</script>

</body>
</html>
